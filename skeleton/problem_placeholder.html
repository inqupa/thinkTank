<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Problems</title>
        <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
        <link rel="stylesheet" href="../skin/theme.css">
        <link rel="stylesheet" href="../skin/base.css">
        <link rel="stylesheet" href="../skin/problem_style_placeholder.css">
        <script src="/subsystems/bootloader/bootloader.js" defer></script>
        <script>
            // Check backend access before rendering
            fetch('/api/problems/access', { method: 'GET' })
                .then(res => {
                    if (res.status === 403) {
                        // Backend enforced the 10-view limit. Redirect to register.
                        alert("You've viewed the problem registry 10 times. Please register to continue as a Solver.");
                        window.location.href = '/skeleton/auth_placeholder.html';
                    }
                })
                .catch(err => console.error("Access check failed", err));
        </script>
    </head>

    <body>
        <nav-bar></nav-bar>

        <div class="empty-container">
            <div id="suggestion-box" style="display: none; padding: 20px; margin: 20px; border: 2px solid #007bff; border-radius: 8px; text-align: center; color: var(--text-color);">
                <h3>Ready to save your vents?</h3>
                <p>We noticed you've been exploring. Create an account to solve problems!</p>
                <button onclick="window.location.href='auth_placeholder.html'" style="border: none; padding: 10px 20px; border-radius: 20px;">Sign Up Now</button>
                <button id="dismiss-suggestion" style="background: none; border: none; color: #888; text-decoration: underline; cursor: pointer; margin-left: 10px;">Not now</button>
            </div>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', () => {
                fetch('/api/problems/access', { method: 'GET' })
                    .then(async res => {
                        if (res.status === 403) {
                            alert("You've viewed the problem registry 10 times. Please register to continue as a Solver.");
                            window.location.href = '/skeleton/auth_placeholder.html';
                            return;
                        }
                        
                        const data = await res.json();
                        
                        // Trigger suggestion box after 3 visits (7 or fewer views left out of 10)
                        const isDismissed = localStorage.getItem('dismissedSuggestion');
                        if (data.viewsLeft !== undefined && data.viewsLeft <= 7 && !isDismissed) {
                            const box = document.getElementById('suggestion-box');
                            if (box) box.style.display = 'block';
                        }
                    })
                    .catch(err => console.error("Access check failed"));

                const dismissBtn = document.getElementById('dismiss-suggestion');
                if (dismissBtn) {
                    dismissBtn.addEventListener('click', () => {
                        localStorage.setItem('dismissedSuggestion', 'true');
                        document.getElementById('suggestion-box').style.display = 'none';
                    });
                }
            });
        </script>
    </body>
</html>
