<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Problems</title>
        <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
        <link rel="stylesheet" href="../skin/theme.css">
        <link rel="stylesheet" href="../skin/base.css">
        <link rel="stylesheet" href="../skin/problem_style_placeholder.css">
        <script src="/subsystems/bootloader/bootloader.js" defer></script>
        <script>
            // Check backend access before rendering
            fetch('/api/problems/access', { method: 'GET' })
                .then(res => {
                    if (res.status === 403) {
                        // Backend enforced the 10-view limit. Redirect to register.
                        alert("You've viewed the problem registry 10 times. Please register to continue as a Solver.");
                        window.location.href = '/skeleton/auth_placeholder.html';
                    }
                })
                .catch(err => console.error("Access check failed", err));
        </script>
    </head>

    <body>
        <nav-bar></nav-bar>

        <div class="empty-container">
            <div id="suggestion-box" style="display: none; padding: 20px; margin: 20px; border: 2px solid #007bff; border-radius: 8px; text-align: center; color: var(--text-color);">
                <h3>Ready to save your vents?</h3>
                <p>We noticed you've been exploring. Create an account to solve problems!</p>
                <button onclick="window.location.href='auth_placeholder.html'" style="border: none; padding: 10px 20px; border-radius: 20px;">Sign Up Now</button>
                <button id="dismiss-suggestion" style="background: none; border: none; color: #888; text-decoration: underline; cursor: pointer; margin-left: 10px;">Not now</button>
            </div>
            <div id="vent-feed-container" style="margin-top: 20px; padding: 10px;"></div>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', () => {
                // 1. Check Access Limits
                fetch('/api/problems/access', { method: 'GET' })
                    .then(async res => {
                        if (res.status === 403) {
                            alert("You've viewed the problem registry 10 times. Please register to continue as a Solver.");
                            window.location.href = '/skeleton/auth_placeholder.html';
                            return;
                        }
                        
                        const data = await res.json();
                        
                        // Handle Suggestion Box
                        const isDismissed = localStorage.getItem('dismissedSuggestion');
                        if (data.viewsLeft !== undefined && data.viewsLeft <= 7 && !isDismissed) {
                            const box = document.getElementById('suggestion-box');
                            if (box) box.style.display = 'block';
                        }

                        // 2. Access Granted: Fetch and Render Vents
                        loadAndRenderVents();
                    })
                    .catch(err => console.error("Access check failed"));

                // Suggestion Box Dismissal Logic
                const dismissBtn = document.getElementById('dismiss-suggestion');
                if (dismissBtn) {
                    dismissBtn.addEventListener('click', () => {
                        localStorage.setItem('dismissedSuggestion', 'true');
                        const box = document.getElementById('suggestion-box');
                        if (box) box.style.display = 'none';
                    });
                }
            });

            // The Secure Rendering Engine
            async function loadAndRenderVents() {
                const feedContainer = document.getElementById('vent-feed-container');
                if (!feedContainer || !window.getVents) return;

                feedContainer.textContent = "Loading network data...";

                const vents = await window.getVents();
                feedContainer.textContent = ""; // Clear loading text

                if (vents.length === 0) {
                    feedContainer.textContent = "No vents found.";
                    return;
                }

                // XSS Protection: We create elements dynamically and use .textContent 
                // This guarantees the browser treats input as raw text, never as executable HTML/JS.
                vents.forEach(vent => {
                    // Skip quarantined test data unless we are in God Mode
                    if (vent.is_test === 1 && !document.cookie.includes('vent_godmode=true')) {
                        return; 
                    }

                    const card = document.createElement('div');
                    card.className = 'vent-card';
                    card.style.cssText = 'border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 5px;';

                    const dateHeader = document.createElement('small');
                    dateHeader.style.cssText = 'color: #666; display: block; margin-bottom: 5px;';
                    // Parse date securely
                    dateHeader.textContent = new Date(vent.created_at).toLocaleString('en-US', { 
                        month: 'long', year: 'numeric', day: 'numeric' 
                    });
                    
                    if (vent.is_test === 1) {
                        dateHeader.textContent += ' [TEST DATA]';
                        dateHeader.style.color = '#ff0000';
                    }

                    const contentBody = document.createElement('p');
                    contentBody.style.cssText = 'font-size: 1.1rem; margin: 0;';
                    contentBody.textContent = vent.content; // Strict XSS protection

                    card.appendChild(dateHeader);
                    card.appendChild(contentBody);
                    feedContainer.appendChild(card);
                });
            }
        </script>
    </body>
</html>
